spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/iam?currentSchema=person
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── S7 Fase B: split Flyway/runtime (auditoría 2026-06-12) ───────────────────
# El RUNTIME conecta con un rol dedicado no-superuser (DB_USER=person_app) → la RLS
# le aplica. Pero ese rol no es dueño de las tablas y no puede correr DDL; por eso
# Flyway usa una conexión SEPARADA como admindb (dueño del schema). Si DB_MIGRATION_*
# no está seteado, Flyway cae al datasource runtime (comportamiento previo).
spring.flyway.url=${DB_MIGRATION_URL:${spring.datasource.url}}
spring.flyway.user=${DB_MIGRATION_USER:${DB_USER}}
spring.flyway.password=${DB_MIGRATION_PASSWORD:${DB_PASSWORD}}

spring.jpa.show-sql=false
logging.level.root=WARN
logging.level.com.imap=INFO
