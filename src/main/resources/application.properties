# Common properties (overridden by application-{profile}.properties)
spring.application.name=imap-person
server.port=8099
server.servlet.context-path=/imap/person

# JPA — set search_path to person schema for all queries
spring.jpa.properties.hibernate.default_schema=person
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect

# Flyway — corre migraciones db/migration al startup
spring.flyway.enabled=true
spring.flyway.schemas=person
spring.flyway.default-schema=person
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.create-schemas=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# 404 -> handler en lugar de Spring default
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ── BPM (s2s — scheduled jobs via message-start) ────────────────────────────
imap.bpm.base-url=http://localhost:8093/imap/bpm
imap.bpm.timeout-seconds=15

# ── System microservice ─────────────────────────────────────────────────────
imap.system.base-url=http://localhost:8092/imap/system
imap.system.timeout-ms=15000

# Active profile
spring.profiles.active=dev
